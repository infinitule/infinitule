<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 148" width="460" height="148" role="img" aria-label="Custom achievements">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1f26"/><stop offset="100%" stop-color="#0b0d11"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4e2a1"/><stop offset="45%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6d1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.28"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <g id="hex">
      <polygon points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21" fill="url(#plate)" stroke="url(#gold)" stroke-width="2.2"/>
      <polygon points="0,-33 28.6,-16.5 28.6,16.5 0,33 -28.6,16.5 -28.6,-16.5" fill="url(#glow)" stroke="#d4af37" stroke-width="0.6" stroke-opacity="0.35"/>
    </g>
  </defs>

  <g transform="translate(60,62)">
    <use href="#hex"/>
    <circle r="19" fill="none" stroke="#d4af37" stroke-width="1.6" stroke-opacity="0.75"/>
    <circle r="13" fill="none" stroke="#8b1a1a" stroke-width="1.2"/>
    <text y="4.5" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="url(#gold)" letter-spacing="1">007</text>
  </g>
  <text x="60" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="600" fill="#d4af37">LICENCE TO COMMIT</text>
  <text x="60" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="7.5" fill="#8b949e">force-push, no questions</text>

  <g transform="translate(170,62)">
    <use href="#hex"/>
    <g fill="none" stroke="#d4af37" stroke-width="1.8" stroke-dasharray="3 2.4" stroke-linecap="round">
      <circle cy="-9" r="8.5"/>
      <path d="M-15,17 C-15,4 -8,0 0,0 C8,0 15,4 15,17"/>
    </g>
    <rect x="-9" y="-12" width="18" height="4.5" rx="1.6" fill="#8b1a1a"/>
  </g>
  <text x="170" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="600" fill="#d4af37">GHOST PROTOCOL</text>
  <text x="170" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="7.5" fill="#8b949e">no trace in the logs</text>

  <g transform="translate(280,62)">
    <use href="#hex"/>
    <path d="M-7,-11 v-4 a3,3 0 0 1 3,-3 h8 a3,3 0 0 1 3,3 v4" fill="none" stroke="#d4af37" stroke-width="1.8"/>
    <rect x="-18" y="-11" width="36" height="24" rx="3" fill="none" stroke="#d4af37" stroke-width="1.8"/>
    <line x1="-18" y1="-2" x2="18" y2="-2" stroke="#d4af37" stroke-width="1.2" stroke-opacity="0.6"/>
    <rect x="-3" y="-5" width="6" height="6" rx="1.2" fill="#8b1a1a"/>
  </g>
  <text x="280" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="600" fill="#d4af37">THE FIXER</text>
  <text x="280" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="7.5" fill="#8b949e">closed the issue quietly</text>

  <g transform="translate(390,62)">
    <use href="#hex"/>
    <path d="M-11,-2 v-12 a11,11 0 0 1 22,0 v12" fill="none" stroke="#d4af37" stroke-width="1.8"/>
    <ellipse cy="-1" rx="21" ry="4.6" fill="none" stroke="#d4af37" stroke-width="1.8"/>
    <line x1="-11" y1="-7" x2="11" y2="-7" stroke="#8b1a1a" stroke-width="2.4"/>
    <path d="M-8,10 h16 M-8,15 h16" stroke="#d4af37" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>
  <text x="390" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="600" fill="#d4af37">OMERTÀ</text>
  <text x="390" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="7.5" fill="#8b949e">zero commit messages</text>
